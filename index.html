<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フクロウ ARダンス</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

  <div id="tap-instruction" style="position: fixed; top: 10px; left: 10px; z-index: 999; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 5px; font-family: sans-serif; font-size: 14px; pointer-events: none;">
    🚨 画面を1回タップしてから、カメラをHIROマーカーにかざしてね！
  </div>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    
    <a-assets>
      <video id="owl-video" src="fukurou.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-marker preset="hiro">
      <a-video src="#owl-video" width="1.5" height="1.5" rotation="-90 0 0" position="0 0 0"></a-video>
    </a-marker>

    <a-entity camera></a-entity>
    
  </a-scene>

  <script>
    const video = document.getElementById('owl-video');
    const instruction = document.getElementById('tap-instruction');

    window.addEventListener('click', function () {
      if (video.paused) {
        video.play();
        instruction.style.display = 'none'; // タップされたら案内を消す
      } else {
        video.pause();
      }
    });
  </script>

</body>
</html>
